name: Build, Push, and Update Helm Values

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout app source
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build jar
        run: ./mvnw clean package -DskipTests

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker image
        run: docker build -t ghcr.io/${{ github.repository_owner }}/hello-k8s:${{ github.sha }} .

      - name: Push Docker image
        run: docker push ghcr.io/${{ github.repository_owner }}/hello-k8s:${{ github.sha }}

      - name: Checkout config repo
        uses: actions/checkout@v4
        with:
          repository: j26423397-byte/kube_dev
          token: ${{ secrets.CONFIG_REPO_TOKEN }}
          path: kube_dev

      - name: Update Helm values image tag
        run: |
          cd kube_dev
          sed -i 's|repository: .*|repository: ghcr.io/${{ github.repository_owner }}/hello-k8s|' values.yaml
          sed -i 's|tag: .*|tag: "${{ github.sha }}"|' values.yaml

      - name: Commit and push config change
        run: |
          cd kubedev/advanced-web
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add values.yaml
          git commit -m "Update image tag to ${{ github.sha }}" || echo "No changes to commit"
          git push